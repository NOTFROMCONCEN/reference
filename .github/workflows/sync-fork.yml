name: Sync fork

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        run: gh repo sync "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}